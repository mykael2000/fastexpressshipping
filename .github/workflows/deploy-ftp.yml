name: Deploy via SFTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, pdo, tokenizer, xml, dom, curl

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Debug workspace
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/public" || true

      - name: Upload app (non-public) to ./app
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          localDir: "${{ github.workspace }}"
          remoteDir: "./app"
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/storage/**
            public/**

      - name: Upload public/ to web root ./
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          localDir: "${{ github.workspace }}/public"
          remoteDir: "./"
          exclude: |
            **/.git*
            **/.github/**

      - name: Prepare patched webroot index.php
        run: |
          set -e
          rm -rf deploy_webroot
          mkdir -p deploy_webroot
          cp public/index.php deploy_webroot/index.php
          sed -i "s#__DIR__\.'/../vendor/autoload.php'#__DIR__.'\/app\/vendor\/autoload.php'#g" deploy_webroot/index.php
          sed -i "s#__DIR__\.'/../bootstrap/app.php'#__DIR__.'\/app\/bootstrap\/app.php'#g" deploy_webroot/index.php

      - name: Upload patched index.php to web root ./
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          localDir: "${{ github.workspace }}/deploy_webroot"
          remoteDir: "./"

      - name: Create deny rules for /app (Apache)
        run: |
          set -e
          rm -rf deploy_app_protect
          mkdir -p deploy_app_protect
          cat > deploy_app_protect/.htaccess <<'EOF'
          Require all denied
          EOF

      - name: Upload /app protection .htaccess
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          localDir: "${{ github.workspace }}/deploy_app_protect"
          remoteDir: "./app"
